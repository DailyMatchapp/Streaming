<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Schedule - Mustapha Tv</title>
    <!-- Basic Icons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Satisfy&family=Poppins:wght@300;400;600;800&display=swap');
        
        :root { 
            --bg-color: #0f1111; 
            --surface-color: #1b1e1e; 
            --accent-color: #2ecc71; 
            --live-color: #ff4757; /* لون للمباريات المباشرة */
            --text-main: #ffffff; 
            --text-dim: #9ca3af; 
            --neo-shadow-out: 8px 8px 16px #080909, -4px -4px 12px #1c2121; 
            --neo-shadow-in: inset 4px 4px 8px #080909, inset -4px -4px 8px #1c2121;
        }

        body { 
            font-family: 'Poppins', sans-serif; background-color: var(--bg-color); 
            color: var(--text-main); margin: 0; display: flex; flex-direction: column; 
            align-items: center; min-height: 100vh;
        }
        
        header { 
            width: 100%; padding: 12px 0; background: var(--surface-color); 
            box-shadow: 0 4px 30px rgba(0,0,0,0.5); display: flex; justify-content: center; 
        }

        .header-container { width: 92%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; }
        .logo-text { 
            font-family: 'Satisfy', cursive; font-size: 1.8rem; 
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }

        .container { width: 95%; max-width: 700px; margin: 20px 0; }
        .back-btn { 
            display: inline-flex; align-items: center; gap: 5px; color: var(--accent-color); 
            text-decoration: none; font-weight: 600; margin-bottom: 20px; font-size: 0.85rem;
        }

        .schedule-list { display: flex; flex-direction: column; gap: 15px; }

        .match-card { 
            background: var(--surface-color); padding: 15px 10px; border-radius: 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: var(--neo-shadow-out); border: 1px solid rgba(255,255,255,0.03);
        }

        .team-box { width: 35%; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .team-box img { 
            width: 42px; height: 42px; object-fit: contain; 
            filter: drop-shadow(0 4px 5px rgba(0,0,0,0.5));
        }
        .team-name { 
            font-size: 0.7rem; font-weight: 600; text-align: center; color: var(--text-main);
            overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }

        .match-center { width: 30%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* تنسيق Badge الحالة */
        .score-badge { 
            padding: 5px 12px; border-radius: 10px; 
            font-weight: 800; font-size: 0.8rem; 
            box-shadow: var(--neo-shadow-in); margin-bottom: 4px;
        }
        .status-upcoming { color: var(--accent-color); }
        .status-live { color: var(--live-color); animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .time-text { font-size: 0.85rem; font-weight: 700; color: var(--text-dim); }
        .league-name { font-size: 0.6rem; color: var(--accent-color); text-transform: uppercase; margin-bottom: 8px; text-align: center; opacity: 0.8; }

        #loading { text-align: center; padding: 50px; color: var(--accent-color); }
        .spinner { font-size: 3rem; margin-bottom: 10px; }
       
        @media (max-width: 400px) {
            .team-box img { width: 35px; height: 35px; }
            .team-name { font-size: 0.65rem; }
            .score-badge { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-container">
        <a href="index.html" style="text-decoration: none;"><div class="logo-text">Match Schedule</div></a>
    </div>
</header>

<div class="container">
    <a href="https://mustaphatv.vercel.app/" class="back-btn"><i class='bx bx-left-arrow-alt'></i> Back Home</a>
    
    <!-- تم الحفاظ على الأيقونة كما طلبت -->
    <div id="loading">
        <div class="spinner"><i class="bx bx-loader-dots bx-spin"></i></div>
        <p>Loading Matches...</p>
    </div>

    <div class="schedule-list" id="schedule-list"></div>
</div>

<script>
    const API_URL = "https://ws.kora-api.top/api/matches/";
    const listContainer = document.getElementById('schedule-list');
    const loadingDiv = document.getElementById('loading');

    async function fetchMatches() {
        try {
            const response = await fetch(API_URL);
            const result = await response.json();
            
            loadingDiv.style.display = 'none';

            if (result.data && result.data.length > 0) {
                renderMatches(result.data);
            } else {
                listContainer.innerHTML = "<p style='text-align:center; color:var(--text-dim);'>No matches found today.</p>";
            }
        } catch (error) {
            loadingDiv.innerHTML = "<p style='color:#ff4757;'>Error loading data. Please try again.</p>";
        }
    }

    function renderMatches(matches) {
        listContainer.innerHTML = "";
        matches.forEach(match => {
            // استخراج اسم الفريقين
            const teamNames = match.name.split(' vs ');
            const team1 = teamNames[0] || "Team 1";
            const team2 = teamNames[1] || "Team 2";

            // تحويل الوقت من ISO إلى الوقت المحلي
            const matchTime = new Date(match.begin_at).toLocaleTimeString('en-GB', { 
                hour: '2-digit', 
                minute: '2-digit',
                hour12: false 
            });

            // تحديد الحالة واللون
            const isLive = match.is_live;
            const statusLabel = isLive ? "LIVE" : "VS";
            const statusClass = isLive ? "status-live" : "status-upcoming";

            const card = document.createElement('div');
            card.className = 'match-card';

            card.innerHTML = `
                <div class="team-box">
                    <img src="${match.logo_team1}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/53/53283.png'">
                    <span class="team-name">${team1}</span>
                </div>
                <div class="match-center">
                    <div class="league-name">${match.category ? match.category.name : 'Match'}</div>
                    <div class="score-badge ${statusClass}">${statusLabel}</div>
                    <div class="time-text">${matchTime}</div>
                </div>
                <div class="team-box">
                    <img src="${match.logo_team2}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/53/53283.png'">
                    <span class="team-name">${team2}</span>
                </div>
            `;
            listContainer.appendChild(card);
        });
    }

    fetchMatches();
</script>

</body>
</html>
